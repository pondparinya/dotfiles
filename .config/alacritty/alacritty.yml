env:
  TERM: screen-256color
colors:
  primary:
    background: "#000000"
    foreground: "#ffffff"
  cursor:
    text: "#F81CE5"
    cursor: "#ffffff"
  normal:
    black: "#000000"
    red: "#fe0100"
    green: "#33ff00"
    yellow: "#feff00"
    blue: "#0066ff"
    magenta: "#cc00ff"
    cyan: "#00ffff"
    white: "#d0d0d0"
  bright:
    black: "#808080"
    red: "#fe0100"
    green: "#33ff00"
    yellow: "#feff00"
    blue: "#0066ff"
    magenta: "#cc00ff"
    cyan: "#00ffff"
    white: "#FFFFFF"
mouse:
  hide_when_typing: true
  url:
    modifiers: Shift
selection:
  save_to_clipboard: true
cursor:
  vi_mode_style: Block
  style: Block
font:
  size: 14
  normal:
    family: Hack Nerd Font
    style: Regular
  bold:
    family: Hack Nerd Font
    style: Bold
  italic:
    family: Hack Nerd Font
    style: Italic
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: true
window:
  padding:
    x: 0
    y: 0
  dynamic_padding: true
  start_maximized: false
scrolling:
  history: 10000
  multiplier: 1
debug:
  render_timer: false
  persistent_logging: false
  log_level: INFO
  print_events: false
  ref_test: false
